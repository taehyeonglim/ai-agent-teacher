<div id="app"></div>

<script>
// 전역 오류 → 명시적 오류 화면 (빈 화면 금지). 오류 문자열은 textContent로만 삽입한다.
window.addEventListener('error', function (e) {
  var app = document.getElementById('app');
  if (!app) return;
  app.innerHTML =
    '<div class="error-screen">' +
    '<h1>문제가 생겼어요</h1>' +
    '<p>게임을 불러오는 중 오류가 발생했습니다. 새로고침해 주세요.</p>' +
    '<pre></pre>' +
    '</div>';
  app.querySelector('pre').textContent = String(e.message || e.error || '알 수 없는 오류');
});
</script>
